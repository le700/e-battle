name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pyinstaller flask flask-cors Pillow beautifulsoup4 lxml numpy pandas pyyaml

    - name: Build EXE
      run: |
        pyinstaller pyinstaller.spec --clean

    - name: List dist directory
      run: |
        dir dist/

    - name: Create Release and Upload
      shell: bash
      env:
        RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      run: |
        TAG="v$(date +%Y.%m.%d-%H%M%S)"
        echo "Tag: $TAG"
        
        RESPONSE=$(curl -s -X POST "https://api.github.com/repos/le700/e-battle/releases" \
          -H "Authorization: token $RELEASE_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          -d "{\"tag_name\":\"$TAG\",\"name\":\"e-battle $TAG\",\"body\":\"Automatic release\",\"draft\":false,\"prerelease\":false}")
        
        echo "Response: $RESPONSE"
        
        UPLOAD_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('upload_url', '').replace('{?name,label}', ''))")
        echo "Upload URL: $UPLOAD_URL"
        
        for FILE in dist/*; do
          if [ -f "$FILE" ]; then
            FILENAME=$(basename "$FILE")
            echo "Uploading $FILENAME..."
            curl -s -X POST "$UPLOAD_URL?name=$FILENAME" \
              -H "Authorization: token $RELEASE_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$FILE"
            echo "Uploaded $FILENAME"
          fi
        done
