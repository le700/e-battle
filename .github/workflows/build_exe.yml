name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pyinstaller flask flask-cors Pillow beautifulsoup4 lxml numpy pandas pyyaml

    - name: Build EXE
      run: |
        pyinstaller pyinstaller.spec --clean

    - name: List dist directory
      run: |
        dir dist/

    - name: Create Release
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      run: |
        $TAG = "v$(Get-Date -Format 'yyyy.MM.dd-HHmmss')"
        Write-Host "Tag: $TAG"
        gh release create $TAG --title "e-battle $TAG" --notes "Automatic release"
        gh release upload $TAG dist/* --clobber
