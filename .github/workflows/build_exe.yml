name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pyinstaller flask flask-cors Pillow beautifulsoup4 lxml numpy pandas pyyaml

    - name: Build EXE
      run: |
        pyinstaller pyinstaller.spec --clean

    - name: Generate Version Tag
      id: version
      shell: pwsh
      run: |
        $VERSION = "v$(Get-Date -Format 'yyyy.MM.dd-HHmmss')"
        Write-Host "Generated version: $VERSION"
        "version=$VERSION" >> $env:GITHUB_OUTPUT

    - name: Create Release and Upload Asset
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: e-battle ${{ steps.version.outputs.version }}
        files: dist/e-battle.exe
