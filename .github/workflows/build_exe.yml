name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pyinstaller flask flask-cors Pillow beautifulsoup4 lxml numpy pandas pyyaml requests

    - name: Build EXE
      run: |
        pyinstaller pyinstaller.spec --clean

    - name: List dist directory
      shell: bash
      run: |
        ls -la dist/

    - name: Create Release and Upload
      shell: bash
      env:
        RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      run: |
        python3 scripts/create_release.py
