name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pyinstaller flask flask-cors Pillow beautifulsoup4 lxml numpy pandas pyyaml

    - name: Build EXE
      run: |
        pyinstaller pyinstaller.spec --clean

    - name: List dist directory
      run: |
        dir dist/

    - name: Create Release with API
      shell: pwsh
      env:
        RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      run: |
        $TAG = "v$(Get-Date -Format 'yyyy.MM.dd-HHmmss')"
        Write-Host "Tag: $TAG"
        
        $headers = @{
            "Authorization" = "token $env:RELEASE_TOKEN"
            "Accept" = "application/vnd.github.v3+json"
        }
        
        $body = @{
            tag_name = $TAG
            name = "e-battle $TAG"
            body = "Automatic release"
            draft = $false
            prerelease = $false
        } | ConvertTo-Json
        
        Write-Host "Creating release..."
        $response = Invoke-RestMethod -Uri "https://api.github.com/repos/le700/e-battle/releases" -Method Post -Headers $headers -Body $body -ContentType "application/json"
        Write-Host "Release created: $($response.html_url)"
        
        $uploadUrl = $response.upload_url -replace '\{.*\}', ""
        Write-Host "Upload URL: $uploadUrl"
        
        Get-ChildItem -Path dist\* -File | ForEach-Object {
            $fileName = $_.Name
            $filePath = $_.FullName
            Write-Host "Uploading $fileName..."
            $fileContent = [System.IO.File]::ReadAllBytes($filePath)
            $fileHeaders = @{
                "Authorization" = "token $env:RELEASE_TOKEN"
                "Content-Type" = "application/octet-stream"
            }
            Invoke-RestMethod -Uri "$uploadUrl?name=$fileName" -Method Post -Headers $fileHeaders -Body $fileContent
            Write-Host "Uploaded $fileName"
        }
