name: Build Windows Executable

on:
  push:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install -r requirements.txt
        
    - name: Create directories
      run: |
        New-Item -ItemType Directory -Force -Path assets
        New-Item -ItemType Directory -Force -Path data/chatlogs
        New-Item -ItemType Directory -Force -Path data/avatars
        New-Item -ItemType Directory -Force -Path data/profiles
        New-Item -ItemType Directory -Force -Path data/debates
        New-Item -ItemType Directory -Force -Path data/shares
        
    - name: List project structure
      run: |
        dir
        dir src
        
    - name: Build EXE
      run: |
        pyinstaller pyinstaller.spec --clean --log-level=DEBUG
        
    - name: List build output
      run: |
        dir dist
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FriendBattle
        path: dist/
        if-no-files-found: warn
        
    - name: Upload to Release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: dist/FriendBattle.exe
        asset_name: FriendBattle.exe
        asset_content_type: application/octet-stream
