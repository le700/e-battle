name: e-battle CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt || echo "No requirements.txt found"
        
    - name: Test import
      run: |
        python -c "import sys; sys.path.insert(0, 'src'); print('Import test passed')"
