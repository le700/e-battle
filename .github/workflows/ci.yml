name: e-battle CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Debug info
      run: |
        python --version
        pip --version
        pip list
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pytest flask flask-cors Pillow beautifulsoup4 lxml pandas numpy pyyaml --no-cache-dir
        
    - name: List project structure
      run: |
        ls -la
        if [ -d "tests" ]; then ls -la tests/; fi
        
    - name: Run tests
      run: |
        if [ -f "tests/test_basic.py" ]; then
          python -m pytest tests/test_basic.py -v --tb=short
        else
          echo "No tests found, skipping..."
        fi
