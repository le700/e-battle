<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FriendBattle - AI好友辩论赛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.8em;
            margin-bottom: 8px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.25);
            letter-spacing: 1px;
        }

        .header p {
            font-size: 1.15em;
            opacity: 0.95;
        }

        .main-content {
            display: grid;
            grid-template-columns: 480px 1fr;
            gap: 25px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.15);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.35em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .btn {
            padding: 13px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.45);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .file-drop-area {
            border: 3px dashed #ccc;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }

        .file-drop-area:hover,
        .file-drop-area.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .file-drop-area .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .file-drop-area p {
            color: #777;
            margin-bottom: 8px;
        }

        .file-info {
            margin-top: 12px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        .file-info.active {
            display: block;
        }

        .file-preview {
            max-height: 150px;
            overflow-y: auto;
            background: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85em;
            color: #555;
            margin-top: 10px;
            border: 1px solid #e0e0e0;
        }

        .avatar-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
            margin-top: 15px;
        }

        .avatar-item {
            background: linear-gradient(135deg, #f8f9fa, #fff);
            border-radius: 14px;
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .avatar-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .avatar-item.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f4ff, #fff);
        }

        .avatar-item .avatar-icon {
            font-size: 2.8em;
            margin-bottom: 10px;
        }

        .avatar-item .avatar-name {
            font-weight: 700;
            color: #333;
            font-size: 1.05em;
        }

        .avatar-item .avatar-style {
            font-size: 0.8em;
            color: #888;
            margin-top: 6px;
            line-height: 1.3;
        }

        .debate-display {
            max-height: 520px;
            overflow-y: auto;
            padding: 22px;
            background: linear-gradient(180deg, #f8f9fa, #fff);
            border-radius: 14px;
            margin-top: 20px;
        }

        .debate-turn {
            margin-bottom: 22px;
            padding: 18px;
            border-radius: 12px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .debate-turn.debater1 {
            background: linear-gradient(135deg, #667eea15, #667eea08);
            border-left: 4px solid #667eea;
        }

        .debate-turn.debater2 {
            background: linear-gradient(135deg, #f5576c15, #f5576c08);
            border-left: 4px solid #f5576c;
        }

        .debate-turn .speaker {
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .debate-turn .content {
            color: #444;
            line-height: 1.75;
        }

        .debate-turn .round-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.78em;
            font-weight: 600;
        }

        .progress-container {
            margin: 20px 0;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.5s ease-out;
        }

        .progress-text {
            font-size: 0.9em;
            color: #666;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 50px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 18px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 4.5em;
            margin-bottom: 18px;
        }

        .history-section {
            margin-top: 30px;
        }

        .history-item {
            background: white;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s;
        }

        .history-item:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 18px;
            padding: 32px;
            max-width: 560px;
            width: 92%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal h3 {
            margin-bottom: 22px;
            font-size: 1.4em;
        }

        .share-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #333, #555);
            color: white;
            padding: 14px 30px;
            border-radius: 10px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1001;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }

        .toast.show {
            opacity: 1;
        }

        .topic-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .topic-tag {
            background: #f0f0f0;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .topic-tag:hover {
            background: #667eea;
            color: white;
        }

        .strategy-select {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .strategy-card {
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .strategy-card:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .strategy-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea10, #764ba210);
        }

        .strategy-name {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .strategy-desc {
            font-size: 0.8em;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎭 FriendBattle</h1>
            <p>AI好友辩论赛 - 让克隆的好友角色进行精彩辩论</p>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="card">
                    <h2>📋 创建新辩论</h2>

                    <div class="form-group">
                        <label>辩题</label>
                        <input type="text" id="debate-topic" placeholder="例如：Python vs JavaScript 哪个更好？">
                        <div class="topic-suggestions" id="topic-suggestions">
                            <span class="topic-tag" onclick="setTopic('甜豆花 vs 咸豆花')">甜豆花 vs 咸豆花</span>
                            <span class="topic-tag" onclick="setTopic('先洗澡还是先吃饭')">先洗澡还是先吃饭</span>
                            <span class="topic-tag" onclick="setTopic('早起 vs 熬夜')">早起 vs 熬夜</span>
                            <span class="topic-tag" onclick="setTopic('游戏本 vs 轻薄本')">游戏本 vs 轻薄本</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>正方辩手</label>
                        <select id="debater1">
                            <option value="">-- 选择角色 --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>反方辩手</label>
                        <select id="debater2">
                            <option value="">-- 选择角色 --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>辩论回合数</label>
                        <select id="debate-rounds">
                            <option value="3">3轮（简短）</option>
                            <option value="5" selected>5轮（标准）</option>
                            <option value="8">8轮（精彩）</option>
                            <option value="10">10轮（完整）</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>辩论策略</label>
                        <div class="strategy-select">
                            <div>
                                <small style="display: block; margin-bottom: 8px; color: #666;">正方策略：</small>
                                <select id="skill1" style="width: 100%;">
                                    <option value="contrarian">杠精 - 总是反驳对方</option>
                                    <option value="rational" selected>理性派 - 摆事实讲道理</option>
                                    <option value="humorous">搞笑 - 幽默风趣</option>
                                    <option value="aggressive">激进 - 观点鲜明</option>
                                    <option value="diplomatic">和事佬 - 寻找共识</option>
                                    <option value="sarcastic">阴阳怪气 - 高级讽刺</option>
                                    <option value="scholar">老学究 - 引经据典</option>
                                    <option value="joker">毒舌 - 一针见血</option>
                                    <option value="lazy">摸鱼 - 敷衍有趣</option>
                                </select>
                            </div>
                            <div>
                                <small style="display: block; margin-bottom: 8px; color: #666;">反方策略：</small>
                                <select id="skill2" style="width: 100%;">
                                    <option value="contrarian">杠精 - 总是反驳对方</option>
                                    <option value="rational">理性派 - 摆事实讲道理</option>
                                    <option value="humorous" selected>搞笑 - 幽默风趣</option>
                                    <option value="aggressive">激进 - 观点鲜明</option>
                                    <option value="diplomatic">和事佬 - 寻找共识</option>
                                    <option value="sarcastic">阴阳怪气 - 高级讽刺</option>
                                    <option value="scholar">老学究 - 引经据典</option>
                                    <option value="joker">毒舌 - 一针见血</option>
                                    <option value="lazy">摸鱼 - 敷衍有趣</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="progress-container" id="progress-container">
                        <div class="progress-text" id="progress-text">准备中...</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                    </div>

                    <button class="btn btn-primary" onclick="startDebate()" id="start-debate-btn" style="width: 100%;">
                        🚀 开始辩论
                    </button>
                </div>

                <div class="card" style="margin-top: 25px;">
                    <h2>➕ 添加新角色</h2>

                    <div class="form-group">
                        <label>角色名称</label>
                        <input type="text" id="new-avatar-name" placeholder="例如：小明">
                    </div>

                    <div class="form-group">
                        <label>聊天记录</label>
                        <div class="file-drop-area" id="file-drop-area">
                            <div class="icon">📁</div>
                            <p>拖拽文件到这里，或点击选择</p>
                            <small style="color: #999;">支持 .txt, .json, .csv, .html</small>
                            <input type="file" id="chat-log-file" accept=".json,.txt,.csv,.html" style="display: none;">
                        </div>
                        <div class="file-info" id="file-info">
                            <div id="file-name-display"></div>
                            <div class="file-preview" id="file-preview"></div>
                        </div>
                    </div>

                    <button class="btn btn-primary" onclick="createAvatar()" id="create-avatar-btn" style="width: 100%;">
                        ✨ 创建角色
                    </button>
                </div>
            </div>

            <div class="right-panel">
                <div class="card">
                    <h2>👥 已创建的角色</h2>
                    <div id="avatar-list" class="avatar-list">
                        <div class="empty-state">
                            <div class="icon">🤖</div>
                            <p>还没有创建任何角色</p>
                            <small>上传聊天记录开始克隆你的好友</small>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 25px;">
                    <h2>💬 辩论进行中</h2>
                    <div id="debate-display" class="debate-display">
                        <div class="empty-state">
                            <div class="icon">🎭</div>
                            <p>选择一个辩题和两位辩手开始辩论</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card history-section">
            <h2>📜 历史辩论</h2>
            <div id="history-list">
                <div class="empty-state">
                    <div class="icon">📚</div>
                    <p>还没有辩论记录</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="share-modal">
        <div class="modal-content">
            <h3>📤 分享辩论</h3>
            <p id="share-topic" style="color: #666; margin-bottom: 10px;"></p>
            <div class="share-buttons">
                <button class="btn btn-secondary" onclick="downloadShare('朋友圈')">朋友圈</button>
                <button class="btn btn-secondary" onclick="downloadShare('微博')">微博</button>
                <button class="btn btn-secondary" onclick="downloadShare('小红书')">小红书</button>
            </div>
            <button class="btn btn-primary" onclick="closeModal()" style="width: 100%; margin-top: 20px;">关闭</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentDebateId = null;

        const fileDropArea = document.getElementById('file-drop-area');
        const fileInput = document.getElementById('chat-log-file');
        const fileInfo = document.getElementById('file-info');
        const fileNameDisplay = document.getElementById('file-name-display');
        const filePreview = document.getElementById('file-preview');

        fileDropArea.addEventListener('click', () => fileInput.click());

        fileDropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDropArea.classList.add('dragover');
        });

        fileDropArea.addEventListener('dragleave', () => {
            fileDropArea.classList.remove('dragover');
        });

        fileDropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDropArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            fileNameDisplay.textContent = `📄 ${file.name} (${formatFileSize(file.size)})`;
            fileInfo.classList.add('active');
            
            if (file.type.startsWith('text/') || file.name.endsWith('.txt') || file.name.endsWith('.json')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = e.target.result.substring(0, 500);
                    filePreview.textContent = preview + '\n...';
                };
                reader.readAsText(file);
            } else {
                filePreview.textContent = '(文件预览不可用)';
            }
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function setTopic(topic) {
            document.getElementById('debate-topic').value = topic;
        }

        async function loadAvatars() {
            try {
                const response = await fetch('/api/avatars');
                const data = await response.json();

                const list = document.getElementById('avatar-list');

                if (!data.avatars || data.avatars.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🤖</div>
                            <p>还没有创建任何角色</p>
                            <small>上传聊天记录开始克隆你的好友</small>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = data.avatars.map(avatar => `
                    <div class="avatar-item" data-id="${avatar.id}">
                        <div class="avatar-icon">👤</div>
                        <div class="avatar-name">${escapeHtml(avatar.name)}</div>
                        <div class="avatar-style">${escapeHtml(avatar.language_style || '普通')}</div>
                    </div>
                `).join('');

                const debater1Select = document.getElementById('debater1');
                const debater2Select = document.getElementById('debater2');

                const options = data.avatars.map(a =>
                    `<option value="${a.id}">${escapeHtml(a.name)}</option>`
                ).join('');

                debater1Select.innerHTML = '<option value="">-- 选择角色 --</option>' + options;
                debater2Select.innerHTML = '<option value="">-- 选择角色 --</option>' + options;

            } catch (error) {
                console.error('加载角色失败:', error);
            }
        }

        async function createAvatar() {
            const name = document.getElementById('new-avatar-name').value.trim();
            const file = fileInput.files[0];

            if (!name) {
                showToast('请输入角色名称');
                return;
            }

            if (!file) {
                showToast('请选择聊天记录文件');
                return;
            }

            const btn = document.getElementById('create-avatar-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 创建中...';

            const formData = new FormData();
            formData.append('chat_log', file);
            formData.append('name', name);
            formData.append('platform', 'auto');

            try {
                const response = await fetch('/api/avatars', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    showToast('🎉 角色创建成功！');
                    loadAvatars();
                    document.getElementById('new-avatar-name').value = '';
                    fileInput.value = '';
                    fileInfo.classList.remove('active');
                } else {
                    showToast('创建失败: ' + (data.error || data.message));
                }
            } catch (error) {
                showToast('创建失败: ' + error.message);
            }

            btn.disabled = false;
            btn.textContent = '✨ 创建角色';
        }

        async function startDebate() {
            const topic = document.getElementById('debate-topic').value.trim();
            const debater1 = document.getElementById('debater1').value;
            const debater2 = document.getElementById('debater2').value;
            const rounds = parseInt(document.getElementById('debate-rounds').value);
            const skill1 = document.getElementById('skill1').value;
            const skill2 = document.getElementById('skill2').value;

            if (!topic) {
                showToast('请输入辩论主题');
                return;
            }

            if (!debater1 || !debater2) {
                showToast('请选择两位辩手');
                return;
            }

            if (debater1 === debater2) {
                showToast('两个辩手不能相同');
                return;
            }

            const btn = document.getElementById('start-debate-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 辩论进行中...';

            const progressContainer = document.getElementById('progress-container');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            progressContainer.classList.add('active');

            const debateDisplay = document.getElementById('debate-display');
            debateDisplay.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在生成辩论...</p>
                </div>
            `;

            try {
                updateProgress(10, '分析辩题中...');
                await sleep(400);
                
                updateProgress(30, '思考论点中...');
                await sleep(500);
                
                updateProgress(50, '生成第一段发言...');
                
                const response = await fetch('/api/debate/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        debater1,
                        debater2,
                        topic,
                        rounds,
                        skill1,
                        skill2
                    })
                });

                updateProgress(80, '整理辩论内容...');

                const data = await response.json();

                updateProgress(100, '完成！');
                await sleep(300);
                progressContainer.classList.remove('active');

                if (data.success) {
                    currentDebateId = data.debate_id;
                    await loadDebate(data.debate_id);
                    showToast('🎉 辩论生成完成！');
                    loadHistory();
                } else {
                    showToast('辩论失败: ' + (data.error || data.message));
                    debateDisplay.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">😢</div>
                            <p>辩论生成失败</p>
                            <small>${escapeHtml(data.error || data.message || '')}</small>
                        </div>
                    `;
                }
            } catch (error) {
                showToast('辩论失败: ' + error.message);
                progressContainer.classList.remove('active');
            }

            btn.disabled = false;
            btn.textContent = '🚀 开始辩论';
        }

        function updateProgress(percent, text) {
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('progress-text').textContent = text;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function loadDebate(debateId) {
            try {
                const response = await fetch(`/api/debate/${debateId}`);
                const data = await response.json();

                const debateDisplay = document.getElementById('debate-display');
                const turns = data.turns.filter(t => t.speaker !== 'System');

                debateDisplay.innerHTML = `
                    <div style="margin-bottom: 20px; text-align: center;">
                        <strong style="font-size: 1.15em;">📌 ${escapeHtml(data.topic)}</strong>
                        <br>
                        <small style="color: #777;">${escapeHtml(data.debater1)} vs ${escapeHtml(data.debater2)}</small>
                    </div>
                ` + turns.map(turn => `
                    <div class="debate-turn ${turn.speaker === data.debater1 ? 'debater1' : 'debater2'}">
                        <div class="speaker">
                            <span>${escapeHtml(turn.speaker)}</span>
                            <span class="round-badge">第${turn.round_num}轮</span>
                        </div>
                        <div class="content">${escapeHtml(turn.content)}</div>
                    </div>
                `).join('') + `
                    <div style="text-align: center; margin-top: 25px;">
                        <button class="btn btn-primary" onclick="openShareModal('${debateId}', '${escapeHtml(data.topic)}')">
                            📤 生成分享图片
                        </button>
                    </div>
                `;

            } catch (error) {
                console.error('加载辩论失败:', error);
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/debates');
                const data = await response.json();

                const historyList = document.getElementById('history-list');

                if (!data.debates || data.debates.length === 0) {
                    historyList.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📚</div>
                            <p>还没有辩论记录</p>
                        </div>
                    `;
                    return;
                }

                historyList.innerHTML = data.debates.slice(0, 10).map(debate => `
                    <div class="history-item" onclick="loadDebate('${debate.id}')">
                        <div>
                            <strong>${escapeHtml(debate.topic)}</strong>
                            <br>
                            <small style="color: #777;">${escapeHtml(debate.debater1)} vs ${escapeHtml(debate.debater2)}</small>
                        </div>
                        <div style="text-align: right;">
                            <span class="round-badge" style="background: #667eea;">${escapeHtml(debate.status)}</span>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('加载历史失败:', error);
            }
        }

        function openShareModal(debateId, topic) {
            currentDebateId = debateId;
            document.getElementById('share-topic').textContent = topic;
            document.getElementById('share-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('share-modal').classList.remove('active');
        }

        async function downloadShare(style) {
            if (!currentDebateId) return;

            try {
                const response = await fetch(`/api/debate/${currentDebateId}/share`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({style, theme: 'light'})
                });

                const data = await response.json();

                if (data.success) {
                    window.open(data.image_url, '_blank');
                    showToast('📸 分享图片已生成！');
                } else {
                    showToast('生成失败: ' + (data.error || data.message));
                }
            } catch (error) {
                showToast('生成失败: ' + error.message);
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadAvatars();
        loadHistory();
    </script>
</body>
</html>
