<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导出聊天记录 - e-battle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 8px;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.35em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .format-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .format-card {
            border: 3px solid #e0e0e0;
            border-radius: 14px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .format-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .format-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea15, #764ba215);
        }

        .format-card .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .format-card .name {
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }

        .format-card .desc {
            font-size: 0.8em;
            color: #888;
        }

        .options-section {
            margin-top: 24px;
        }

        .option-group {
            margin-bottom: 18px;
        }

        .option-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .option-group input,
        .option-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .option-group input:focus,
        .option-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.45);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .progress-container {
            margin-top: 24px;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.5s;
        }

        .progress-text {
            margin-top: 12px;
            text-align: center;
            color: #666;
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .result-card h3 {
            color: #333;
            margin-bottom: 12px;
        }

        .result-card .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .result-card .file-icon {
            font-size: 2.5em;
        }

        .result-card .file-details {
            flex: 1;
        }

        .result-card .file-name {
            font-weight: 600;
            color: #333;
        }

        .result-card .file-path {
            font-size: 0.85em;
            color: #888;
        }

        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #333, #555);
            color: white;
            padding: 14px 30px;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }

        .preview-section {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
        }

        .preview-message {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .preview-message.self {
            background: #667eea15;
            margin-left: 20%;
        }

        .preview-message.other {
            background: #f0f0f0;
            margin-right: 20%;
        }

        .preview-message .sender {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .preview-message .content {
            color: #555;
        }

        .preview-message .time {
            font-size: 0.75em;
            color: #999;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📤 导出聊天记录</h1>
            <p>选择导出格式和选项，导出您的聊天记录</p>
        </div>

        <div class="card">
            <h2>📋 步骤 1: 选择导出格式</h2>

            <div class="format-grid" id="format-grid">
                <div class="format-card selected" data-format="chatlab">
                    <div class="icon">🏆</div>
                    <div class="name">ChatLab</div>
                    <div class="desc">行业标准格式，推荐使用</div>
                </div>

                <div class="format-card" data-format="html">
                    <div class="icon">🌐</div>
                    <div class="name">HTML</div>
                    <div class="desc">网页格式，可直接浏览</div>
                </div>

                <div class="format-card" data-format="json">
                    <div class="icon">📄</div>
                    <div class="name">JSON</div>
                    <div class="desc">原始数据格式</div>
                </div>

                <div class="format-card" data-format="markdown">
                    <div class="icon">📝</div>
                    <div class="name">Markdown</div>
                    <div class="desc">适合笔记软件</div>
                </div>

                <div class="format-card" data-format="excel">
                    <div class="icon">📊</div>
                    <div class="name">Excel</div>
                    <div class="desc">表格格式，便于分析</div>
                </div>

                <div class="format-card" data-format="csv">
                    <div class="icon">📋</div>
                    <div class="name">CSV</div>
                    <div class="desc">逗号分隔值</div>
                </div>

                <div class="format-card" data-format="txt">
                    <div class="icon">📃</div>
                    <div class="name">TXT</div>
                    <div class="desc">纯文本格式</div>
                </div>

                <div class="format-card" data-format="weclone">
                    <div class="icon">🤖</div>
                    <div class="name">WeClone</div>
                    <div class="desc">兼容 WeClone 格式</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>⚙️ 步骤 2: 配置导出选项</h2>

            <div class="options-section">
                <div class="option-group">
                    <label>聊天名称</label>
                    <input type="text" id="chat-name" placeholder="例如：张三的聊天记录">
                </div>

                <div class="option-group">
                    <label>消息筛选</label>
                    <select id="message-filter">
                        <option value="all">导出全部消息</option>
                        <option value="100">最近 100 条消息</option>
                        <option value="500">最近 500 条消息</option>
                        <option value="1000">最近 1000 条消息</option>
                    </select>
                </div>

                <div class="option-group">
                    <label>时间范围</label>
                    <select id="time-range">
                        <option value="all">全部时间</option>
                        <option value="7days">最近 7 天</option>
                        <option value="30days">最近 30 天</option>
                        <option value="90days">最近 90 天</option>
                        <option value="1year">最近 1 年</option>
                    </select>
                </div>

                <div class="option-group">
                    <label>主题风格</label>
                    <select id="theme">
                        <option value="light">浅色主题</option>
                        <option value="dark">深色主题</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>👁️ 步骤 3: 预览消息</h2>

            <div id="preview-section" class="preview-section">
                <p style="text-align: center; color: #999;">请先选择要导出的聊天记录</p>
            </div>
        </div>

        <div class="card">
            <h2>🚀 步骤 4: 开始导出</h2>

            <div style="text-align: center; margin-bottom: 20px;">
                <button class="btn btn-primary" onclick="startExport()" id="export-btn" style="min-width: 200px;">
                    📤 开始导出
                </button>
            </div>

            <div class="progress-container" id="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="progress-text" id="progress-text">准备中...</div>
            </div>

            <div id="result-container"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let selectedFormat = 'chatlab';
        let chatMessages = [];

        // 格式卡片选择
        document.querySelectorAll('.format-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.format-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedFormat = card.dataset.format;
            });
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateProgress(percent, text) {
            const fill = document.getElementById('progress-fill');
            const textEl = document.getElementById('progress-text');
            fill.style.width = percent + '%';
            textEl.textContent = text;
        }

        async function startExport() {
            const chatName = document.getElementById('chat-name').value.trim() || '聊天记录';
            const messageFilter = document.getElementById('message-filter').value;
            const timeRange = document.getElementById('time-range').value;
            const theme = document.getElementById('theme').value;

            const btn = document.getElementById('export-btn');
            const progressContainer = document.getElementById('progress-container');
            const resultContainer = document.getElementById('result-container');

            btn.disabled = true;
            btn.textContent = '⏳ 导出中...';
            progressContainer.classList.add('active');
            resultContainer.innerHTML = '';
            updateProgress(0, '准备导出...');

            try {
                updateProgress(20, '正在准备数据...');
                await new Promise(resolve => setTimeout(resolve, 500));

                updateProgress(40, '正在处理消息...');
                await new Promise(resolve => setTimeout(resolve, 500));

                updateProgress(60, '正在生成文件...');

                const response = await fetch('/api/export', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        format: selectedFormat,
                        chat_name: chatName,
                        message_filter: messageFilter,
                        time_range: timeRange,
                        theme: theme
                    })
                });

                const data = await response.json();

                updateProgress(100, '导出完成！');

                if (data.success) {
                    resultContainer.innerHTML = `
                        <div class="result-card">
                            <h3>✅ 导出成功！</h3>
                            <div class="file-info">
                                <div class="file-icon">📄</div>
                                <div class="file-details">
                                    <div class="file-name">${data.filename}</div>
                                    <div class="file-path">${data.filepath}</div>
                                </div>
                            </div>
                            <div style="margin-top: 15px;">
                                <button class="btn btn-secondary" onclick="downloadFile('${data.filepath}')">
                                    ⬇️ 下载文件
                                </button>
                            </div>
                        </div>
                    `;
                    showToast('🎉 导出成功！');
                } else {
                    resultContainer.innerHTML = `
                        <div class="result-card" style="background: #fff0f0;">
                            <h3>❌ 导出失败</h3>
                            <p>${data.error || '未知错误'}</p>
                        </div>
                    `;
                    showToast('❌ 导出失败');
                }

            } catch (error) {
                resultContainer.innerHTML = `
                    <div class="result-card" style="background: #fff0f0;">
                        <h3>❌ 导出失败</h3>
                        <p>${error.message}</p>
                    </div>
                `;
                showToast('❌ 导出失败');
            }

            btn.disabled = false;
            btn.textContent = '📤 开始导出';

            setTimeout(() => {
                progressContainer.classList.remove('active');
            }, 2000);
        }

        function downloadFile(filepath) {
            window.open(`/api/export/download?path=${encodeURIComponent(filepath)}`, '_blank');
        }

        // 页面加载时获取示例数据
        async function loadPreview() {
            try {
                const response = await fetch('/api/export/preview');
                const data = await response.json();

                if (data.messages && data.messages.length > 0) {
                    chatMessages = data.messages;
                    renderPreview();
                }
            } catch (error) {
                console.error('加载预览失败:', error);
            }
        }

        function renderPreview() {
            const previewSection = document.getElementById('preview-section');
            const filter = document.getElementById('message-filter').value;

            let messages = [...chatMessages];
            if (filter !== 'all') {
                messages = messages.slice(-parseInt(filter));
            }

            if (messages.length === 0) {
                previewSection.innerHTML = '<p style="text-align: center; color: #999;">暂无消息</p>';
                return;
            }

            previewSection.innerHTML = messages.slice(-10).map(msg => {
                const isSelf = msg.sender === '我' || msg.sender === 'Me';
                return `
                    <div class="preview-message ${isSelf ? 'self' : 'other'}">
                        <div class="sender">${msg.sender}</div>
                        <div class="content">${msg.content}</div>
                        <div class="time">${msg.time || ''}</div>
                    </div>
                `;
            }).join('');
        }

        // 监听筛选变化
        document.getElementById('message-filter').addEventListener('change', renderPreview);

        // 初始化
        loadPreview();
    </script>
</body>
</html>
